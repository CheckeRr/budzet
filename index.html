<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>#xeonzi</title>
    <meta name="theme-color" content="#ffffff">

    <style>
        *,*::before,*::after{box-sizing:border-box}
        html{font-size:62.5%;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
        body{font-family:'Inter','Helvetica Neue',Helvetica,Arial,sans-serif;font-size:140%;line-height:1.5;color:#000;background:#fff;margin:0;overflow-x:hidden}
        img{max-width:100%;vertical-align:middle;border:0}
        a{color:#000;text-decoration:none;transition:opacity .2s}
        a:hover{opacity:.4}
        ul{list-style:none;margin:0;padding:0}
        .wrapper{padding-left:250px;min-height:100vh}
        .header-wrapper{z-index:1000;position:fixed;left:250px;width:250px;height:100%;margin-left:-250px;top:0;background:#fff;display:flex;flex-direction:column;justify-content:space-between}
        .header{position:relative;width:250px;margin:0;padding:24px 30px;display:flex;flex-direction:column}
        .logo{margin-bottom:40px;padding-left:20px}
        .logo a{display:block;line-height:1}
        .logo-img{height:auto;width:130px;display:block}
        #header-menu{padding-left:20px}
        #header-menu ul{display:flex;flex-direction:column;gap:2px}
        #header-menu li a{font-size:12px;font-weight:400;letter-spacing:.06em;color:#000;text-transform:uppercase;display:inline-block;padding:4px 0}
        #header-menu li a.active{opacity:.4}
        .nav-button{display:none}
        main{position:relative;margin:30px 30px 30px 0}
        .packery-grid{position:relative;width:100%}
        .packery-gutter-sizer{width:2%;margin:0}
        .packery-grid-sizer,.packery-grid-item{width:32%;margin:0}
        .packery-grid-item.w2{width:66%}
        .packery-grid-item{margin-bottom:2%;cursor:pointer;position:relative;background:#f5f5f5;transition:opacity .25s;float:left}
        .packery-grid-item:hover{opacity:.7}
        .packery-wrapper{position:relative;width:100%}
        .packery-inner{position:absolute;top:0;bottom:0;left:0;right:0;overflow:hidden}
        .packery-inner img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover}
        .packery-grid-item.loading{background:#f0f0f0;animation:shimmer 1.5s infinite}
        @keyframes shimmer{0%{background:#f0f0f0}50%{background:#e8e8e8}100%{background:#f0f0f0}}

        /* 4 kolumny */
        @media(min-width:59.6875em){.packery-gutter-sizer{width:2%}.packery-grid-sizer,.packery-grid-item{width:23.5%}.packery-grid-item.w2{width:49%}.packery-grid-item{margin-bottom:2%}}
        /* 5 kolumn */
        @media(min-width:90.063em){.packery-gutter-sizer{width:1.5%}.packery-grid-sizer,.packery-grid-item{width:18.8%}.packery-grid-item.w2{width:39.1%}.packery-grid-item{margin-bottom:1.5%}}

        /* Lightbox */
        .lightbox{position:fixed;inset:0;z-index:10000;background:rgba(255,255,255,.98);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .4s;cursor:pointer}
        .lightbox.active{opacity:1;pointer-events:auto}
        .lightbox-image-wrap{position:relative;display:flex;align-items:center;justify-content:center;max-width:90vw;max-height:86vh;z-index:10001;cursor:default}
        .lightbox-image-wrap img{max-width:90vw;max-height:86vh;object-fit:contain;box-shadow:0 0 0 1px rgba(0,0,0,.04),0 20px 60px rgba(0,0,0,.08);transition:opacity .4s,transform .4s}
        .lightbox-image-wrap img.switching{opacity:0;transform:scale(.97)}
        .lightbox-close{position:fixed;top:24px;right:28px;z-index:10010;width:48px;height:48px;display:flex;align-items:center;justify-content:center;cursor:pointer;background:0;border:0;color:#999;font-size:32px;font-weight:200;line-height:1;transition:color .2s,transform .2s;font-family:inherit;padding:0}
        .lightbox-close:hover{color:#000;transform:scale(1.1)}
        .lightbox-nav{position:fixed;top:50%;transform:translateY(-50%);z-index:10010;width:56px;height:56px;display:flex;align-items:center;justify-content:center;cursor:pointer;background:0;border:0;color:#bbb;font-size:42px;font-weight:200;line-height:1;transition:color .2s;font-family:inherit;padding:0;opacity:0}
        .lightbox.active .lightbox-nav{opacity:1;transition:opacity .4s .15s,color .2s}
        .lightbox-nav:hover{color:#000}
        .lightbox-prev{left:16px}.lightbox-next{right:16px}
        .lightbox-counter{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);z-index:10010;font-size:12px;font-weight:400;letter-spacing:.08em;color:#999;pointer-events:none}
        .footer{width:100%;text-align:center;padding:50px 20px 40px;font-size:11px;font-weight:400;letter-spacing:.08em;color:#bbb;text-transform:uppercase;background:#fff;clear:both}

        /* Mobile */
        @media(max-width:768px){
            .wrapper{padding-left:0}
            .header-wrapper{position:static;width:auto;height:auto;margin-left:0;padding:0;background:#fff;z-index:100}
            .header{position:static;width:auto;margin:0;padding:12px 16px;flex-direction:row;align-items:center;justify-content:space-between}
            .logo{margin-bottom:0;padding-left:0}
            .logo-img{height:40px;width:auto}
            #header-menu{display:none;padding-left:0}
            #header-menu.toggle{display:block;position:absolute;top:70px;left:0;width:100%;background:#fff;padding:20px;border-bottom:1px solid #eee;z-index:999}
            #header-menu ul{gap:4px}
            #header-menu li a{font-size:14px;padding:6px 0}
            .nav-button{display:block;background:0;border:0;width:44px;height:44px;cursor:pointer;position:relative;padding:0}
            .nav-button::before,.nav-button::after{content:'';position:absolute;left:10px;width:24px;height:2px;background:#000;transition:transform .25s}
            .nav-button::before{top:16px}.nav-button::after{bottom:16px}
            .nav-button.active::before{transform:rotate(45deg)translate(5px,5px);top:21px}
            .nav-button.active::after{transform:rotate(-45deg)translate(5px,-5px);bottom:21px}
            main{margin:10px}
            .packery-gutter-sizer{width:3%}
            .packery-grid-sizer,.packery-grid-item{width:48.5%}
            .packery-grid-item.w2{width:100%}
            .packery-grid-item{margin-bottom:3%}
            .lightbox-image-wrap{max-width:94vw;max-height:82vh}
            .lightbox-image-wrap img{max-width:94vw;max-height:82vh}
            .lightbox-close{top:14px;right:14px;width:40px;height:40px;font-size:26px}
            .lightbox-nav{width:40px;height:40px;font-size:32px}
            .lightbox-prev{left:4px}.lightbox-next{right:4px}
            .lightbox-counter{bottom:20px;font-size:10px}
            .footer{padding:30px 16px}
        }
        @media(max-width:480px){
            .packery-grid-sizer,.packery-grid-item{width:100%}
            .packery-grid-item.w2{width:100%}
            .packery-grid-item{margin-bottom:4%}
            main{margin:6px}
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..500&display=swap" rel="stylesheet">
</head>
<body>

<div class="wrapper">

    <!-- SIDEBAR -->
    <div class="header-wrapper">
        <header class="header">
            <div class="logo">
                <a href="#">
                    <img src="logo.png" alt="#xeonzi" class="logo-img">
                </a>
            </div>
            <button class="nav-button" id="navButton" aria-label="Menu"></button>
            <nav id="mainNav">
                <div id="header-menu" class="menu">
                    <ul>
                        <li><a href="#" class="active" data-filter="all">HOME</a></li>
                        <li><a href="#" data-filter="street">STREET</a></li>
                        <li><a href="#" data-filter="cars">CARS</a></li>
                        <li><a href="#" data-filter="nature">NATURE</a></li>
                        <li><a href="#" data-filter="other">OTHER</a></li>
                    </ul>
                </div>
            </nav>
        </header>
    </div>

    <!-- GALERIA -->
    <main>
        <div class="packery-grid" id="packeryGrid">
            <div class="packery-gutter-sizer"></div>
            <div class="packery-grid-sizer"></div>
        </div>
    </main>

    <!-- STOPKA -->
    <footer class="footer">&copy; 2026 #xeonzi</footer>

</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" aria-hidden="true">
    <button class="lightbox-close" id="lightboxClose">&times;</button>
    <button class="lightbox-nav lightbox-prev" id="lightboxPrev">‹</button>
    <button class="lightbox-nav lightbox-next" id="lightboxNext">›</button>
    <div class="lightbox-image-wrap">
        <img src="" alt="" id="lightboxImg">
    </div>
    <span class="lightbox-counter" id="lightboxCounter"></span>
</div>

<!-- PACKERY + IMAGESLOADED -->
<script src="https://unpkg.com/packery@2/dist/packery.pkgd.min.js"></script>
<script src="https://unpkg.com/imagesloaded@5/imagesloaded.pkgd.min.js"></script>

<script>
(function(){
    // ============================================================
    // 👇 TU DODAJESZ SWOJE ZDJĘCIA – tylko 3 pola do wpisania 👇
    // ============================================================
    // src: ścieżka do zdjęcia
    // cat: kategoria – 'street' | 'cars' | 'nature' | 'other'
    // w2:  true = szerokie (2 kolumny), false = normalne (1 kolumna)
    // ============================================================
    const photos = [
        // STREET
        { src:'https://ik.imagekit.io/y5xibwdltl/_DSC5759.jpg', cat:'street', w2:false },
        { src:'https://ik.imagekit.io/y5xibwdltl/_DSC5672.jpg?updatedAt=1775941428335', cat:'street', w2:true  },
        { src:'https://ik.imagekit.io/y5xibwdltl/DSC05653.jpeg?updatedAt=1775505141116', cat:'street', w2:false },

        // CARS
        { src:'https://ik.imagekit.io/y5xibwdltl/_DSC5721.jpg',  cat:'cars',   w2:false },
        { src:'https://ik.imagekit.io/y5xibwdltl/_DSC5689.jpg',  cat:'cars',   w2:false },
        { src:'https://ik.imagekit.io/y5xibwdltl/_DSC5707.jpg',  cat:'cars',   w2:false },
        { src:'https://ik.imagekit.io/y5xibwdltl/_DSC5710.jpg',  cat:'cars',   w2:false },
        { src:'https://ik.imagekit.io/y5xibwdltl/_DSC5724.jpg',  cat:'cars',   w2:true },
        { src:'https://ik.imagekit.io/y5xibwdltl/_DSC5731.jpg',  cat:'cars',   w2:false },
        { src:'https://ik.imagekit.io/y5xibwdltl/_DSC5732.jpg',  cat:'cars',   w2:false },
        { src:'https://ik.imagekit.io/y5xibwdltl/_DSC5735.jpg',  cat:'cars',   w2:false },
        { src:'https://ik.imagekit.io/y5xibwdltl/_DSC5734.jpg',  cat:'cars',   w2:false },

        // NATURE
        { src:'https://ik.imagekit.io/y5xibwdltl/_DSC5741.jpg',cat:'nature', w2:false  },
        { src:'https://ik.imagekit.io/y5xibwdltl/_DSC5744.jpg',cat:'nature', w2:true },
        { src:'https://ik.imagekit.io/y5xibwdltl/_DSC5745.jpg',cat:'nature', w2:false },

        // OTHER
        { src:'https://ik.imagekit.io/y5xibwdltl/_DSC5769.jpg', cat:'other',  w2:false },
        { src:'https://ik.imagekit.io/y5xibwdltl/_DSC5767.jpg', cat:'other',  w2:true  },
        { src:'https://ik.imagekit.io/y5xibwdltl/DSC05629.jpg?updatedAt=1775505140989', cat:'other',  w2:false },
    ];

    // ==================== RESZTA DZIAŁA AUTOMATYCZNIE ====================
    const grid = document.getElementById('packeryGrid');
    const lb = document.getElementById('lightbox');
    const lbImg = document.getElementById('lightboxImg');
    const lbCounter = document.getElementById('lightboxCounter');
    const navBtn = document.getElementById('navButton');
    const menu = document.getElementById('header-menu');
    const navLinks = menu.querySelectorAll('a[data-filter]');

    let currentIdx = 0, lbOpen = false, lastFocus = null, pckry = null;
    let filtered = [...photos];

    // Hamburger
    navBtn.onclick = () => {
        const a = navBtn.classList.toggle('active');
        menu.classList.toggle('toggle');
        navBtn.setAttribute('aria-expanded',a);
    };

    // Filtry
    navLinks.forEach(l => l.onclick = e => {
        e.preventDefault();
        navLinks.forEach(x => x.classList.remove('active'));
        l.classList.add('active');
        const f = l.dataset.filter;
        filtered = f === 'all' ? [...photos] : photos.filter(p => p.cat === f);
        build();
        if(window.innerWidth <= 768){ navBtn.classList.remove('active'); menu.classList.remove('toggle'); }
    });

    // Budowanie galerii
    function build(){
        grid.querySelectorAll('.packery-grid-item').forEach(el => el.remove());
        if(pckry){ pckry.destroy(); pckry = null; }
        const frag = document.createDocumentFragment();
        filtered.forEach((p,i) => {
            const div = document.createElement('div');
            div.className = 'packery-grid-item loading';
            if(p.w2) div.classList.add('w2');
            div.dataset.idx = i;
            const wrap = document.createElement('div');
            wrap.className = 'packery-wrapper';
            wrap.style.paddingBottom = p.paddingBottom || '150%'; // fallback
            const inner = document.createElement('div');
            inner.className = 'packery-inner';
            const img = document.createElement('img');
            img.src = p.src;
            img.alt = p.cat + ' ' + (i+1);
            img.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;';
            img.onload = () => { div.classList.remove('loading'); if(pckry) pckry.layout(); };
            img.onerror = () => { div.classList.remove('loading'); div.style.background='#e0e0e0'; };
            inner.appendChild(img);
            wrap.appendChild(inner);
            div.appendChild(wrap);
            div.onclick = () => openLb(i);
            frag.appendChild(div);
        });
        grid.appendChild(frag);
        imagesLoaded(grid, () => {
            pckry = new Packery(grid, {
                itemSelector:'.packery-grid-item',
                gutter:'.packery-gutter-sizer',
                columnWidth:'.packery-grid-sizer',
                percentPosition:true,
                transitionDuration:'0.3s'
            });
            grid.querySelectorAll('.packery-grid-item.loading').forEach(el => el.classList.remove('loading'));
        });
    }

    // Lightbox
    function openLb(i){
        if(!filtered[i]) return;
        currentIdx = i; lbOpen = true; lastFocus = document.activeElement;
        updateLb(); lb.classList.add('active'); lb.setAttribute('aria-hidden','false');
        document.body.style.overflow = 'hidden';
        setTimeout(() => document.getElementById('lightboxClose').focus(), 100);
    }
    function closeLb(){
        lbOpen = false; lb.classList.remove('active'); lb.setAttribute('aria-hidden','true');
        document.body.style.overflow = '';
        if(lastFocus && lastFocus.focus) setTimeout(() => lastFocus.focus(), 100);
    }
    function updateLb(){
        const p = filtered[currentIdx];
        lbImg.classList.add('switching');
        lbCounter.textContent = (currentIdx+1) + ' / ' + filtered.length;
        setTimeout(() => { lbImg.src = p.src; lbImg.alt = p.cat; lbImg.classList.remove('switching'); }, 200);
    }
    function prev(){ currentIdx = (currentIdx-1+filtered.length) % filtered.length; updateLb(); }
    function next(){ currentIdx = (currentIdx+1) % filtered.length; updateLb(); }

    document.getElementById('lightboxClose').onclick = e => { e.stopPropagation(); closeLb(); };
    document.getElementById('lightboxPrev').onclick = e => { e.stopPropagation(); prev(); };
    document.getElementById('lightboxNext').onclick = e => { e.stopPropagation(); next(); };
    lb.onclick = e => { if(e.target === lb) closeLb(); };
    document.querySelector('.lightbox-image-wrap').onclick = e => {
        e.stopPropagation(); if(e.target.tagName !== 'BUTTON') next();
    };
    document.onkeydown = e => {
        if(!lbOpen) return;
        if(e.key === 'Escape') closeLb();
        if(e.key === 'ArrowLeft') prev();
        if(e.key === 'ArrowRight') next();
    };
    let tx = 0;
    lb.addEventListener('touchstart', e => { tx = e.changedTouches[0].screenX; }, {passive:true});
    lb.addEventListener('touchend', e => {
        if(!lbOpen) return;
        const d = tx - e.changedTouches[0].screenX;
        if(Math.abs(d) > 60) d > 0 ? next() : prev();
        tx = 0;
    });

    window.addEventListener('resize', () => { if(pckry) pckry.layout(); });

    build();
})();
</script>
</body>
</html>
