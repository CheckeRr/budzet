<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Photos | @xeonzi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #fef9f2 0%, #fff5ed 100%);
            color: #4a3b2f;
            min-height: 100vh;
        }

        /* Główna treść */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 80px 48px 60px;
        }

        .hero {
            text-align: center;
            margin-bottom: 100px;
            padding-top: 40px;
            animation: fadeSlideUp 0.8s ease;
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hero h1 {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(9rem, 12vw, 8rem);
            font-weight: 400;
            background: linear-gradient(135deg, #e8b88a 0%, #d4a373 40%, #c49a6c 70%, #b8895a 100%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 8px;
            animation: subtleFloat 4s ease-in-out infinite;
            display: inline-block;
        }

        @keyframes subtleFloat {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-4px);
            }
        }

        /* Kontener na info – większy odstęp od nazwy */
        .hero-info {
            margin-top: 32px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .hero-info p {
            font-family: 'Space Mono', monospace;
            font-size: 0.75rem;
            font-weight: 500;
            color: #cbb292;
            letter-spacing: 4px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .hero-info p i {
            font-size: 0.8rem;
            color: #c4a07a;
        }

        /* ========== POLAROIDY ========== */
        .polaroid-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 48px 36px;
        }

        .polaroid {
            background: #ffffff;
            padding: 16px 16px 42px 16px;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.04);
            transition: all 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            cursor: pointer;
            border-radius: 2px;
            animation: cardFloatIn 0.6s ease backwards;
            animation-delay: calc(var(--order, 0) * 0.05s);
        }

        @keyframes cardFloatIn {
            from {
                opacity: 0;
                transform: translateY(50px) rotate(0deg);
            }
            to {
                opacity: 1;
                transform: translateY(0) rotate(var(--rotate-start, 0deg));
            }
        }

        .polaroid:nth-child(odd) {
            --rotate-start: -0.6deg;
            transform: rotate(-0.6deg);
        }
        .polaroid:nth-child(even) {
            --rotate-start: 0.5deg;
            transform: rotate(0.5deg);
        }
        .polaroid:hover {
            transform: translateY(-10px) rotate(0deg);
            box-shadow: 0 28px 40px rgba(100, 70, 40, 0.12);
        }

        .polaroid img {
            width: 100%;
            aspect-ratio: 4 / 5;
            object-fit: cover;
            display: block;
            transition: filter 0.3s ease;
        }

        .polaroid:hover img {
            filter: brightness(1.02) contrast(1.02);
        }

        /* Lightbox */
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(254, 249, 242, 0.98);
            backdrop-filter: blur(16px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0.25s, opacity 0.25s ease;
            cursor: pointer;
        }

        .lightbox.active {
            visibility: visible;
            opacity: 1;
        }

        .lightbox-frame {
            background: white;
            padding: 20px 20px 38px 20px;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.1);
            max-width: 88%;
            max-height: 88%;
            transform: scale(0.92);
            opacity: 0;
            transition: transform 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1), opacity 0.3s ease;
        }

        .lightbox.active .lightbox-frame {
            transform: scale(1);
            opacity: 1;
        }

        .lightbox-img {
            max-width: 100%;
            max-height: 70vh;
            object-fit: contain;
            display: block;
        }

        .close-lb {
            position: absolute;
            top: 28px;
            right: 36px;
            font-size: 1.6rem;
            font-weight: 300;
            color: #c4a07a;
            cursor: pointer;
            transition: all 0.25s;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(200, 170, 140, 0.1);
        }

        .close-lb:hover {
            background: rgba(200, 170, 140, 0.2);
            transform: rotate(90deg);
            color: #a07858;
        }

        /* Responsywność */
        @media (max-width: 800px) {
            .container {
                padding: 60px 28px 40px;
            }
            .hero {
                margin-bottom: 70px;
            }
            .polaroid-grid {
                gap: 36px 28px;
            }
            .hero-info {
                margin-top: 28px;
            }
            .hero-info p {
                font-size: 0.65rem;
                letter-spacing: 3px;
            }
        }

        @media (max-width: 600px) {
            .polaroid-grid {
                grid-template-columns: 1fr;
                gap: 40px;
            }
            .hero h1 {
                font-size: 3.2rem;
            }
            .container {
                padding: 50px 20px 40px;
            }
            .close-lb {
                top: 18px;
                right: 18px;
                width: 38px;
                height: 38px;
            }
            .hero-info {
                margin-top: 24px;
            }
            .hero-info p {
                font-size: 0.6rem;
                letter-spacing: 2px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="hero">
        <h1>Xeonzi</h1>
        <div class="hero-info">
            <p><i class="fab fa-discord"></i> @xeonzi</p>
            <p><i class="fas fa-camera"></i> Sony A6400 · 35mm f/1.8</p>
        </div>
    </div>

    <div class="polaroid-grid" id="polaroidGrid"></div>
</div>

<div id="lightbox" class="lightbox">
    <span class="close-lb"><i class="fas fa-times"></i></span>
    <div class="lightbox-frame">
        <img class="lightbox-img" id="lightboxImg" alt="">
    </div>
</div>

<script>
    const photos = [
        "https://ik.imagekit.io/y5xibwdltl/_DSC5721.jpg",
        "https://ik.imagekit.io/y5xibwdltl/_DSC5689.jpg",
        "https://ik.imagekit.io/y5xibwdltl/_DSC5707.jpg",
        "https://ik.imagekit.io/y5xibwdltl/_DSC5710.jpg",
        "https://ik.imagekit.io/y5xibwdltl/DSC05552-2.jpg?updatedAt=1775505143236",
        "https://ik.imagekit.io/y5xibwdltl/DSC05576.jpg?updatedAt=1775505143031",
        "https://ik.imagekit.io/y5xibwdltl/_DSC5672.jpg",
        "https://ik.imagekit.io/y5xibwdltl/DSC05653.jpeg?updatedAt=1775505141116",
        "https://ik.imagekit.io/y5xibwdltl/DSC05650.jpeg?updatedAt=1775505141049",
        "https://ik.imagekit.io/y5xibwdltl/DSC05628.jpg?updatedAt=1775505141199",
        "https://ik.imagekit.io/y5xibwdltl/DSC05629.jpg?updatedAt=1775505140989",
        "https://ik.imagekit.io/y5xibwdltl/DSC05631.jpg?updatedAt=1775505140866",
        "https://ik.imagekit.io/y5xibwdltl/DSC05616.jpg?updatedAt=1775505141125",
        "https://ik.imagekit.io/y5xibwdltl/DSC05612.jpg?updatedAt=1775505140681",
        "https://ik.imagekit.io/y5xibwdltl/DSC05606.jpg?updatedAt=1775505140582",
        "https://ik.imagekit.io/y5xibwdltl/DSC05610.jpg?updatedAt=1775505140513"
    ];

    const polaroidGrid = document.getElementById('polaroidGrid');
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightboxImg');
    const closeBtn = document.querySelector('.close-lb');

    function renderPolaroids() {
        polaroidGrid.innerHTML = '';
        photos.forEach((src, idx) => {
            const polaroid = document.createElement('div');
            polaroid.className = 'polaroid';
            polaroid.style.setProperty('--order', idx);
            polaroid.innerHTML = `<img src="${src}" alt="zdjęcie ${idx + 1}" loading="lazy">`;
            polaroid.addEventListener('click', () => openLightbox(src));
            polaroidGrid.appendChild(polaroid);
        });
    }

    function openLightbox(src) {
        lightboxImg.src = src;
        lightbox.classList.add('active');
        document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
        lightbox.classList.remove('active');
        document.body.style.overflow = '';
    }

    closeBtn.addEventListener('click', closeLightbox);
    lightbox.addEventListener('click', (e) => {
        if (e.target === lightbox || e.target.classList.contains('lightbox-frame')) {
            closeLightbox();
        }
    });

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && lightbox.classList.contains('active')) {
            closeLightbox();
        }
    });

    renderPolaroids();
</script>
</body>
</html>
