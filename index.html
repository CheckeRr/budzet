<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>@xeonzi</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Mono', monospace;
            background-color: #fefaf5;
            color: #2c241a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
            flex: 1;
        }

        .site-header {
            text-align: center;
            padding: 4rem 0 5rem 0;
        }

        .logo {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: -1px;
            color: #2c241a;
            text-decoration: none;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.8rem;
            margin-bottom: 4rem;
        }

        .photo-card {
            cursor: pointer;
            overflow: hidden;
            background: #f0ede5;
            aspect-ratio: 1 / 1;
            position: relative;
            border-radius: 4px;
            
            /* Animacja pojawiania się */
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;
        }

        .photo-card:nth-child(1) { animation-delay: 0.05s; }
        .photo-card:nth-child(2) { animation-delay: 0.1s; }
        .photo-card:nth-child(3) { animation-delay: 0.15s; }
        .photo-card:nth-child(4) { animation-delay: 0.2s; }
        .photo-card:nth-child(5) { animation-delay: 0.25s; }
        .photo-card:nth-child(6) { animation-delay: 0.3s; }
        .photo-card:nth-child(7) { animation-delay: 0.35s; }
        .photo-card:nth-child(8) { animation-delay: 0.4s; }
        .photo-card:nth-child(9) { animation-delay: 0.45s; }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* NOWA ANIMACJA PO NAJECHANIU – delikatne przyciemnienie + glow */
        .photo-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0);
            transition: background 0.35s ease;
            z-index: 1;
            pointer-events: none;
        }

        .photo-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            box-shadow: inset 0 0 0 0 rgba(255, 255, 255, 0);
            transition: box-shadow 0.4s ease;
            z-index: 1;
            pointer-events: none;
            border-radius: 4px;
        }

        .photo-card:hover::before {
            background: rgba(0, 0, 0, 0.08);
        }

        .photo-card:hover::after {
            box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.3), inset 0 0 15px 2px rgba(255, 255, 255, 0.2);
        }

        .photo-card img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
            transition: transform 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .photo-card:hover img {
            transform: scale(1.03);
        }

        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 250, 245, 0.97);
            backdrop-filter: blur(12px);
            z-index: 1100;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .lightbox.active {
            display: flex;
            opacity: 1;
        }

        .lightbox-img {
            max-width: 88vw;
            max-height: 88vh;
            width: auto;
            height: auto;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.1);
            animation: zoomIn 0.25s ease;
        }

        @keyframes zoomIn {
            from {
                transform: scale(0.96);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .close-lightbox {
            position: absolute;
            top: 1.8rem;
            right: 2rem;
            font-size: 2rem;
            color: #2c241a;
            cursor: pointer;
            opacity: 0.5;
            transition: opacity 0.2s;
        }

        .close-lightbox:hover {
            opacity: 1;
        }

        .site-footer {
            text-align: center;
            padding: 2rem 0 3rem 0;
        }

        .footer-content {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 2rem;
            font-size: 0.8rem;
            color: #7a6a5a;
        }

        .footer-item {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
        }

        .footer-item a {
            color: #7a6a5a;
            text-decoration: none;
        }

        .footer-item a:hover {
            color: #2c241a;
        }

        @media (max-width: 900px) {
            .container { padding: 0 1.5rem; }
            .logo { font-size: 2.5rem; }
            .site-header { padding: 3rem 0 4rem 0; }
            .gallery { gap: 1.2rem; }
        }

        @media (max-width: 750px) {
            .gallery { grid-template-columns: repeat(2, 1fr); gap: 1rem; }
        }

        @media (max-width: 550px) {
            .container { padding: 0 1rem; }
            .logo { font-size: 2rem; }
            .site-header { padding: 2rem 0 3rem 0; }
            .gallery { grid-template-columns: 1fr; }
            .footer-content { gap: 1rem; flex-direction: column; }
        }
    </style>
</head>

<div id="lightbox" class="lightbox">
    <span class="close-lightbox">&times;</span>
    <img class="lightbox-img" id="lightbox-img" src="" alt="">
</div>

<script>
    (function() {
        const cards = document.querySelectorAll('.photo-card');
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const closeBtn = document.querySelector('.close-lightbox');

        function openLightbox(imgSrc) {
            lightboxImg.src = imgSrc;
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            lightbox.classList.remove('active');
            document.body.style.overflow = '';
            setTimeout(() => {
                if (!lightbox.classList.contains('active')) lightboxImg.src = '';
            }, 150);
        }

        cards.forEach(card => {
            card.addEventListener('click', (e) => {
                e.stopPropagation();
                const img = card.querySelector('img');
                if (img && img.src) openLightbox(img.src);
            });
        });

        lightbox.addEventListener('click', (e) => {
            if (e.target === lightbox || e.target === closeBtn) closeLightbox();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && lightbox.classList.contains('active')) closeLightbox();
        });
    })();
</script>
