<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Photos | @xeonzi</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Space Mono', monospace;
            background: #000000;
            color: #f0f0f0;
            overflow: hidden;
            height: 100vh;
        }

        .time-machine {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        .cards-stack {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            position: absolute;
            width: 85%;
            max-width: 800px;
            aspect-ratio: 16 / 9;
            background: #000000;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            cursor: pointer;
            transition: transform 0.55s cubic-bezier(0.2, 0.95, 0.4, 1.05), opacity 0.3s ease;
            will-change: transform, opacity;
        }
        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            pointer-events: none;
        }

        /* LIGHTBOX */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(15px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }
        .lightbox.active {
            display: flex;
        }
        .lightbox-img {
            max-width: 85vw;
            max-height: 85vh;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        .close-lightbox {
            position: absolute;
            top: 2rem;
            right: 2rem;
            font-size: 2rem;
            color: white;
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.2s;
        }
        .close-lightbox:hover {
            opacity: 1;
        }

        /* informacja dla użytkownika – idealnie wyśrodkowana */
        .info-message {
            position: fixed;
            bottom: 5rem;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            font-size: 0.7rem;
            color: rgba(255,255,255,0.5);
            letter-spacing: 1px;
            z-index: 100;
            pointer-events: none;
            font-family: 'Space Mono', monospace;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(4px);
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            white-space: nowrap;
        }

        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            text-align: center;
            padding: 1rem;
            font-size: 0.7rem;
            color: rgba(255,255,255,0.4);
            background: transparent;
            z-index: 100;
            display: flex;
            justify-content: center;
            gap: 1.5rem;
        }
        .footer a {
            color: rgba(255,255,255,0.5);
            text-decoration: none;
            transition: color 0.2s;
        }
        .footer a:hover {
            color: white;
        }

        @media (max-width: 800px) {
            .card { width: 90%; }
            .info-message { font-size: 0.6rem; bottom: 4rem; padding: 0.4rem 1rem; white-space: nowrap; }
        }
        @media (max-width: 550px) {
            .info-message { font-size: 0.55rem; bottom: 4rem; padding: 0.4rem 0.8rem; white-space: nowrap; }
            .footer { padding: 0.8rem; gap: 1rem; }
            .close-lightbox { top: 1rem; right: 1rem; font-size: 1.5rem; }
        }
    </style>
</head>
<body>

<div class="time-machine" id="timeMachine">
    <div class="cards-stack" id="cardsStack"></div>
</div>

<div class="info-message">
    <i class="fas fa-mouse-pointer"></i> scroll / strzałki ← → &nbsp;&nbsp;|&nbsp;&nbsp; <i class="fas fa-expand"></i> kliknij na zdjęcie
</div>

<div class="footer">
    <span><i class="fab fa-discord"></i> @xeonzi</span>
    <span><i class="fas fa-camera"></i> Sony A58 · 18-55mm</span>
</div>

<div id="lightbox" class="lightbox">
    <span class="close-lightbox">&times;</span>
    <img class="lightbox-img" id="lightbox-img" src="" alt="">
</div>

<script>
    (function() {
        // ========== ZDJĘCIA – LOSOWANIE KOLEJNOŚCI ==========
        const rawImages = [
            "https://ik.imagekit.io/y5xibwdltl/DSC05653.jpeg",
            "https://ik.imagekit.io/y5xibwdltl/DSC05552-2.jpg",
            "https://ik.imagekit.io/y5xibwdltl/DSC05576.jpg",
            "https://ik.imagekit.io/y5xibwdltl/DSC05628.jpg",
            "https://ik.imagekit.io/y5xibwdltl/DSC05616.jpg",
            "https://ik.imagekit.io/y5xibwdltl/DSC05650.jpeg",
            "https://ik.imagekit.io/y5xibwdltl/DSC05629.jpg",
            "https://ik.imagekit.io/y5xibwdltl/DSC05631.jpg",
            "https://ik.imagekit.io/y5xibwdltl/DSC05549.jpg",
            "https://ik.imagekit.io/y5xibwdltl/DSC05612.jpg",
            "https://ik.imagekit.io/y5xibwdltl/DSC05606.jpg",
            "https://ik.imagekit.io/y5xibwdltl/DSC05610.jpg"
        ];

        // LOSOWANIE KOLEJNOŚCI ZDJĘĆ
        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        const IMAGES = shuffleArray([...rawImages]);

        let currentIndex = 0;
        const VISIBLE_BACK_CARDS = 3;
        const Y_OFFSET = -14;
        const SCALE_STEP = 0.025;
        
        let scrollAccumulator = 0;
        let lastUpdateTime = Date.now();
        let isAnimating = false;

        const container = document.getElementById('timeMachine');
        const stack = document.getElementById('cardsStack');
        
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const closeBtn = document.querySelector('.close-lightbox');
        
        function getImageIndex(index) {
            return ((index % IMAGES.length) + IMAGES.length) % IMAGES.length;
        }

        function openLightbox(imgSrc) {
            lightboxImg.src = imgSrc;
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            lightbox.classList.remove('active');
            document.body.style.overflow = '';
            setTimeout(() => {
                if (!lightbox.classList.contains('active')) lightboxImg.src = '';
            }, 200);
        }

        function updateCards() {
            stack.innerHTML = '';
            
            for (let offset = 0; offset <= VISIBLE_BACK_CARDS; offset++) {
                const cardIndex = currentIndex + offset;
                const imgSrc = IMAGES[getImageIndex(cardIndex)];
                
                const y = offset * Y_OFFSET;
                const scale = 1 - (offset * SCALE_STEP);
                const zIndex = 1000 - offset;
                
                const card = document.createElement('div');
                card.className = 'card';
                card.style.transform = `translateY(${y}px) scale(${scale})`;
                card.style.zIndex = zIndex;
                
                card.innerHTML = `<img src="${imgSrc}" alt="" loading="lazy">`;
                
                card.addEventListener('click', (e) => {
                    e.stopPropagation();
                    openLightbox(imgSrc);
                });
                
                stack.appendChild(card);
            }
        }

        function nextCard() {
            if (isAnimating) return;
            isAnimating = true;
            currentIndex++;
            updateCards();
            setTimeout(() => { isAnimating = false; }, 600);
        }

        function prevCard() {
            if (isAnimating) return;
            isAnimating = true;
            currentIndex--;
            updateCards();
            setTimeout(() => { isAnimating = false; }, 600);
        }

        const SCROLL_THRESHOLD = 40;
        const MIN_UPDATE_INTERVAL = 75;

        function handleWheel(e) {
            e.preventDefault();
            if (isAnimating) return;
            
            scrollAccumulator += e.deltaY;
            
            const now = Date.now();
            if (Math.abs(scrollAccumulator) >= SCROLL_THRESHOLD && now - lastUpdateTime >= MIN_UPDATE_INTERVAL) {
                if (scrollAccumulator > 0) nextCard();
                else prevCard();
                scrollAccumulator = 0;
                lastUpdateTime = now;
            }
        }
        
        function onKeyDown(e) {
            if (isAnimating) return;
            if (e.key === 'ArrowRight') { nextCard(); e.preventDefault(); }
            else if (e.key === 'ArrowLeft') { prevCard(); e.preventDefault(); }
            else if (e.key === 'Escape' && lightbox.classList.contains('active')) { closeLightbox(); }
        }
        
        container.addEventListener('wheel', handleWheel, { passive: false });
        document.addEventListener('keydown', onKeyDown);
        
        lightbox.addEventListener('click', (e) => {
            if (e.target === lightbox || e.target === closeBtn) closeLightbox();
        });
        
        updateCards();
        
        console.log('Time Machine – instrukcja wyśrodkowana, losowa kolejność zdjęć!');
    })();
</script>
</body>
</html>
