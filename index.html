<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Marta Lens | Portfolio</title>
    <!-- Space Mono -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Mono', monospace;
            background-color: #fffef5;
            color: #1e1b15;
            line-height: 1.4;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* kontener główny – maksymalna szerokość, ale zdjęcia wypełniają */
        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 0 2rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* HEADER – logo wyśrodkowane, duży odstęp od zdjęć */
        .site-header {
            text-align: center;
            padding: 4rem 0 5rem 0;
            border: none;
        }

        .logo {
            font-size: 3.2rem;
            font-weight: 700;
            letter-spacing: -1.5px;
            color: #1e1b15;
            text-decoration: none;
            display: inline-block;
        }

        /* GRID – 3 KOLUMNY, DUŻE ZDJĘCIA, MAKSYMALNE WYPEŁNIENIE */
        .gallery {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.8rem;
            margin-bottom: 4rem;
        }

        /* karta zdjęcia – KWADRAT (1:1), duży, wypełnia przestrzeń */
        .photo-card {
            cursor: pointer;
            overflow: hidden;
            background: #f0ede5;
            aspect-ratio: 1 / 1;  /* kwadrat */
            transition: transform 0.3s ease, opacity 0.25s ease;
        }

        .photo-card:hover {
            transform: translateY(-5px);
            opacity: 0.94;
        }

        .photo-card img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;  /* zdjęcie wypełnia kwadrat, przycinając krawędzie */
            transition: all 0.3s ease;
        }

        /* LIGHTBOX – wyświetla zdjęcie w ORYGINALNYM ROZMIARZE */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 254, 245, 0.97);
            backdrop-filter: blur(16px);
            z-index: 1100;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .lightbox.active {
            display: flex;
            opacity: 1;
        }

        .lightbox-img {
            max-width: 90vw;
            max-height: 90vh;
            width: auto;
            height: auto;
            object-fit: contain;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.1);
            border-radius: 2px;
        }

        .close-lightbox {
            position: absolute;
            top: 2rem;
            right: 2.2rem;
            font-size: 2.2rem;
            color: #2b241c;
            cursor: pointer;
            opacity: 0.5;
            transition: opacity 0.2s;
            font-weight: 300;
            font-family: 'Space Mono', monospace;
        }

        .close-lightbox:hover {
            opacity: 1;
        }

        /* STOPKA – WIĘKSZA */
        .site-footer {
            text-align: center;
            padding: 3rem 0 4rem 0;
            border: none;
            margin-top: auto;
        }

        .footer-text {
            font-size: 0.9rem;
            letter-spacing: 1px;
            color: #8a8475;
            font-weight: 400;
        }

        .footer-copyright {
            font-size: 0.7rem;
            color: #b0aa9a;
            margin-top: 0.8rem;
            letter-spacing: 0.5px;
        }

        /* responsywność – płynne przejście na mniejsze ekrany */
        @media (max-width: 1000px) {
            .container {
                padding: 0 1.5rem;
            }
            .gallery {
                gap: 1.5rem;
            }
        }

        @media (max-width: 800px) {
            .logo {
                font-size: 2.6rem;
            }
            .site-header {
                padding: 3rem 0 4rem 0;
            }
            .gallery {
                grid-template-columns: repeat(2, 1fr);
                gap: 1.2rem;
            }
            .footer-text {
                font-size: 0.8rem;
            }
        }

        @media (max-width: 550px) {
            .container {
                padding: 0 1.2rem;
            }
            .logo {
                font-size: 2.2rem;
            }
            .site-header {
                padding: 2.5rem 0 3.5rem 0;
            }
            .gallery {
                grid-template-columns: 1fr;
                gap: 1.2rem;
            }
            .footer-text {
                font-size: 0.75rem;
            }
            .close-lightbox {
                top: 1rem;
                right: 1rem;
                font-size: 1.6rem;
            }
        }

        /* ukrycie ewentualnych opisów */
        .photo-title, .photo-caption, .photo-info {
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <header class="site-header">
        <div class="logo">Marta Lens</div>
    </header>

    <!-- GALERIA – 3 KOLUMNY, KWADRATOWE ZDJĘCIA -->
    <div class="gallery" id="galleryContainer">
        <!-- 
            📸 JAK DODAWAĆ ZDJĘCIA (folder "images"):
            
            1. Utwórz folder "images" obok pliku index.html
            2. Wrzuć swoje zdjęcia (WAŻNE: wrzuć je w ORYGINALNEJ, DUŻEJ ROZDZIELCZOŚCI)
            3. Dla każdego zdjęcia wklej:
            
               <div class="photo-card" data-full="images/nazwa_pliku.jpg">

            ✔️ Zdjęcia są wyświetlane jako kwadraty (1:1) w galerii

            ✔️ Na szerokim ekranie 3 kolumny, na tabletach 2, na telefonach 1
            ✔️ Zdjęcia są duże i wypełniają przestrzeń
        -->

        <!-- PRZYKŁADOWE ZDJĘCIA (zastąp własnymi ścieżkami z folderu images/)
             Uwaga: używam Unsplash z kwadratowym przycięciem dla przykładu,
             ale w Twoim przypadku data-full wskazuje na ORYGINALNY plik -->
        
        <div class="photo-card" data-full="https://images.unsplash.com/photo-1531746020798-e6953c6e8e04?w=1600&h=1600&fit=crop">

        <div class="photo-card" data-full="https://images.unsplash.com/photo-1500462918059-b1a0cb512f1d?w=1600&h=1600&fit=crop">
            <img src="https://images.unsplash.com/photo-1500462918059-b1a0cb512f1d?w=800&h=800&fit=crop" alt="" loading="lazy">
        </div>

        <div class="photo-card" data-full="https://images.unsplash.com/photo-1509316975850-ff9c5deb3cd9?w=1600&h=1600&fit=crop">
            <img src="https://images.unsplash.com/photo-1509316975850-ff9c5deb3cd9?w=800&h=800&fit=crop" alt="" loading="lazy">
        </div>

        </div>

        <div class="photo-card" data-full="https://images.unsplash.com/photo-1580489944761-15a19d654956?w=1600&h=1600&fit=crop">

        </div>
    </div>

    <footer class="site-footer">
        <div class="footer-text">MARTA LENS / FOTOGRAFIA</div>
        <div class="footer-copyright">© 2025</div>
    </footer>
</div>

<!-- Lightbox -->
<div id="lightbox" class="lightbox">
    <span class="close-lightbox">&times;</span>
    <img class="lightbox-img" id="lightbox-img" src="" alt="podgląd">
</div>

<script>
    (function() {
        const cards = document.querySelectorAll('.photo-card');
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const closeBtn = document.querySelector('.close-lightbox');

        function openLightbox(imgSrc) {
            // ŁADUJEMY ORYGINALNY PLIK – bez żadnej modyfikacji URL
            lightboxImg.src = imgSrc;
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            lightbox.classList.remove('active');
            document.body.style.overflow = '';
            setTimeout(() => {
                if (!lightbox.classList.contains('active')) {
                    lightboxImg.src = '';
                }
            }, 150);
        }

        cards.forEach(card => {
            card.addEventListener('click', (e) => {
                e.stopPropagation();
                // pobieramy ORYGINALNY URL z data-full
                let fullUrl = card.getAttribute('data-full');
                if (!fullUrl) {
                    // fallback – jeśli brak data-full, użyj src z obrazka
                    const imgInside = card.querySelector('img');
                    if (imgInside && imgInside.src) {
                        fullUrl = imgInside.src;
                    }
                }
                if (fullUrl) openLightbox(fullUrl);
            });
        });

        lightbox.addEventListener('click', (e) => {
            if (e.target === lightbox || e.target === closeBtn) {
                closeLightbox();
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && lightbox.classList.contains('active')) {
                closeLightbox();
            }
        });

        console.log('✅ 3 kolumny, kwadratowe zdjęcia, lightbox z oryginalnym rozmiarem');
    })();
</script>

<!-- 
    ✨ CO OTRZYMUJESZ:
    
    📐 UKŁAD:
    - 3 równe kolumny na szerokim ekranie (powyżej 800px)
    - 2 kolumny na tabletach (550-800px)
    - 1 kolumna na telefonach (poniżej 550px)
    - Duże odstępy między zdjęciami (gap: 1.8rem)
    
    🟦 ZDJĘCIA:
    - KWADRATOWE (aspect-ratio: 1/1)
    - object-fit: cover – zdjęcia wypełniają cały kwadrat
    - Maksymalne wypełnienie przestrzeni
    
    🔍 LIGHTBOX:
    - Po kliknięciu wyświetla zdjęcie w ORYGINALNYM rozmiarze
    - Nie modyfikuje URL – ładuje dokładnie to, co wskazuje data-full
    - Przyciemnione, rozmyte tło
    
    🎨 STOPKA:
    - Większa, bardziej wyrazista
    - Dwie linie tekstu
    
    ⚖️ LOGO:
    - Idealnie wyśrodkowane, duży odstęp od zdjęć
    
    📸 JAK DODAĆ WŁASNE ZDJĘCIA:
    1. Stwórz folder "images"
    2. Wrzuć swoje zdjęcia w ORYGINALNEJ, DUŻEJ ROZDZIELCZOŚCI (np. 2000x2000px lub więcej)
    3. Dla każdego zdjęcia dodaj:
       <div class="photo-card" data-full="images/twoj_plik.jpg">
           <img src="images/twoj_plik.jpg" alt="" loading="lazy">
       </div>
    
    💡 WSKAZÓWKA:
    - Możesz użyć tego samego pliku w src i data-full – wtedy miniatura będzie taka sama jak oryginał
    - Dla lepszej wydajności możesz stworzyć mniejsze wersje do galerii (np. 800x800px),
      a w data-full wskazać oryginalny plik w pełnej rozdzielczości
    - Przykład: 
      <div class="photo-card" data-full="images/oryginal_2000px.jpg">
          <img src="images/miniatura_800px.jpg" alt="" loading="lazy">
      </div>
-->
